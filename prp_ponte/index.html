<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:transparent;
    font:12px -apple-system,Segoe UI,Roboto,sans-serif;color:#64748b}
</style>
</head>
<body>
<script>
/* PONTE editor -> programa (protocolo de componente do Streamlit, sem libs).
   O editor (iframe same-origin) grava no localStorage do app, ao apertar ENVIAR:
     localStorage['prp_envio']    = JSON do lancamento
     localStorage['prp_envio_id'] = numero do envio (cresce a cada ENVIAR)
   Esta ponte le esse localStorage e devolve {id, data} para o Python assim que
   aparece um envio NOVO (id > o ja consumido). O Python decide carregar (auto)
   ou mostrar o botao "Carregar agora" (manual). O upload manual continua valendo. */
(function () {
  var consumido = 0;   // maior id ja processado pelo Python (vem no render)
  var enviado = 0;     // maior id ja mandado ao Python nesta montagem

  function post(msg) { msg.isStreamlitMessage = true; window.parent.postMessage(msg, "*"); }
  function setValue(v) { post({ type: "streamlit:setComponentValue", value: v, dataType: "json" }); }
  function altura(h) { post({ type: "streamlit:setFrameHeight", height: h }); }

  function checar() {
    try {
      var id = parseInt(localStorage.getItem("prp_envio_id") || "0", 10) || 0;
      if (id > consumido && id > enviado) {
        var js = localStorage.getItem("prp_envio") || "";
        enviado = id;
        setValue({ id: id, data: js });
      }
    } catch (e) { /* localStorage bloqueado -> upload manual continua */ }
  }

  window.addEventListener("message", function (ev) {
    var d = ev.data;
    if (!d || d.type !== "streamlit:render") return;
    var args = d.args || {};
    if (typeof args.consumido === "number") consumido = args.consumido;
    altura(0);
    checar();
  });

  post({ type: "streamlit:componentReady", apiVersion: 1 });
  altura(0);
  setInterval(checar, 700);   // pega o envio que acontece com a tela ja aberta
})();
</script>
</body>
</html>
